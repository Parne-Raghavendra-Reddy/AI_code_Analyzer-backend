<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – AI Code Analyzer</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <!-- Logo / Brand -->
    <div class="auth-brand">
        <div class="brand-icon"><i class="fas fa-code"></i></div>
        <h1>AI Code Analyzer</h1>
        <p>Learn to code with AI-powered explanations</p>
    </div>

    <!-- Login Card -->
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-form">
            <h2>Welcome Back!</h2>
            <p class="form-subtitle">Sign in to your account</p>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="loginError" class="alert alert-error" style="display:none"></div>

            <button class="btn btn-primary btn-full" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <div class="default-creds">
                <p><strong>Default accounts:</strong></p>
                <p>Admin: <code>admin / admin123</code></p>
                <p>User: <code>user / user123</code></p>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="auth-form" style="display:none">
            <h2>Create Account</h2>
            <p class="form-subtitle">Join and start learning!</p>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="Min 6 characters">
                    <button type="button" class="toggle-pw" onclick="togglePassword('regPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="regError" class="alert alert-error" style="display:none"></div>
            <div id="regSuccess" class="alert alert-success" style="display:none"></div>

            <button class="btn btn-primary btn-full" onclick="register()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>
    </div>

    <!-- Features Preview -->
    <div class="features-preview">
        <div class="feature-item">
            <i class="fas fa-play-circle"></i>
            <span>Run Java, C & Python</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-robot"></i>
            <span>AI Explanations</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-chart-bar"></i>
            <span>Code Analytics</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-youtube"></i>
            <span>Video Suggestions</span>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
