# ============================================================
# AI Code Analyzer - Application Configuration
# ============================================================

# Server Port
server.port=8090

# ============================================================
# MySQL Database Configuration
# Change username/password to match your MySQL setup
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/code_analyzer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Reddy@1029
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Settings
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Secret Key (change this to a strong secret in production)
# ============================================================
app.jwt.secret=CodeAnalyzerSecretKey2024VeryLongAndSecureSecretKeyForJWT
app.jwt.expiration=86400000

# ============================================================
# AI API Configuration (Claude / OpenAI compatible)
# Replace with your actual API key
# ============================================================
app.ai.api.key=YOUR_ANTHROPIC_API_KEY_HERE
app.ai.api.url=https://api.anthropic.com/v1/messages
app.ai.model=claude-sonnet-4-20250514

# ============================================================
# Code Execution Settings
# ============================================================
app.execution.timeout=10
app.execution.max-output-length=10000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# Logging
# ============================================================
logging.level.com.codeanalyzer=DEBUG
logging.level.org.springframework.security=INFO
