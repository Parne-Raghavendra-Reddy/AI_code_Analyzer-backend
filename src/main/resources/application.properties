# ============================================================
# AI Code Analyzer - Application Configuration
# ============================================================

# Server Port
server.port=${PORT:8090}

# ============================================================
# MySQL Database Configuration
# Change username/password to match your PostgreSQL setup
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://dpg-d778ou1r0fns73f0v8eg-a:5432/ai_code_analyzer_db}
spring.datasource.username=${DB_USERNAME:ai_code_analyzer_db_user}
spring.datasource.password=${DB_PASSWORD:GBZSnYItxDYHwTIwxNu3Zdu3sfJwwgfF}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Settings
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Secret Key (change this to a strong secret in production)
# ============================================================
app.jwt.secret=${JWT_SECRET:CodeAnalyzerSecretKey2024VeryLongAndSecureSecretKeyForJWT}
app.jwt.expiration=86400000

# ============================================================
# AI API Configuration (Claude / OpenAI compatible)
# Replace with your actual API key
# ============================================================
app.ai.api.key=${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY_HERE}
app.ai.api.url=https://api.anthropic.com/v1/messages
app.ai.model=claude-sonnet-4-20250514

# ============================================================
# Code Execution Settings
# ============================================================
app.execution.timeout=10
app.execution.max-output-length=10000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# Logging
# ============================================================
logging.level.com.codeanalyzer=DEBUG
logging.level.org.springframework.security=INFO
